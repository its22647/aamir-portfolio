<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Muhammad Aamir Bakhsh</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2a;
            --primary: #00f2fe;
            --accent: #00ff88;
            --text: #e2e8f0;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .contact-container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        .glass-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        h2 { color: #fff; margin-bottom: 30px; font-size: 2rem; }
        .contact-item {
            background: rgba(255,255,255,0.03);
            margin: 15px 0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 242, 254, 0.1);
        }
        .info-text { font-weight: 500; font-size: 1.1rem; color: var(--primary); }
        .copy-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .copy-btn:hover { background: var(--accent); color: #000; }
        .back-btn {
            margin-top: 30px;
            display: inline-block;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }
        .back-btn:hover { opacity: 1; color: var(--primary); }
        .toast {
            position: fixed;
            bottom: 20px;
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

<div class="contact-container" data-aos="zoom-in">
    <div class="glass-card">
        <h2>Get In Touch</h2>
        
        <div class="contact-item">
            <span class="info-text" id="email">m.aamirbakhsh@gmail.com</span>
            <button class="copy-btn" onclick="copyToClipboard('email')">Copy</button>
        </div>

        <div class="contact-item">
            <span class="info-text" id="phone">+92 335 1483179</span>
            <button class="copy-btn" onclick="copyToClipboard('phone')">Copy</button>
        </div>

        <div class="contact-item">
            <span class="info-text">Rawalpindi, Pakistan</span>
            <span style="color: var(--accent); font-size: 0.8rem;">Location</span>
        </div>

        <a href="index.html" class="back-btn">← Back to Portfolio</a>
    </div>
</div>

<div id="toast" class="toast">Copied to clipboard!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    AOS.init({ duration: 800 });

    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }
</script>
</body>
</html>
